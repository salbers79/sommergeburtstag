<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gästeliste | Sommergeburtstag</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; background-color: #f3f4f6; }
        .serif { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="min-h-screen p-4 sm:p-8 text-slate-800">
    <div class="max-w-3xl mx-auto">
        <header class="mb-6">
            <a href="/" class="text-sm text-slate-500 hover:text-slate-800">&larr; Zur Einladung</a>
            <h1 class="serif text-3xl font-extrabold text-slate-900 mt-2">Gästeliste 🎉</h1>
            <p class="text-slate-500 text-sm">Alle Zu- und Absagen zum Sommergeburtstag</p>
        </header>

        <!-- Zusammenfassung -->
        <div class="grid grid-cols-3 gap-3 mb-6">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 text-center">
                <div id="stat-yes" class="text-3xl font-extrabold text-emerald-600">0</div>
                <div class="text-xs uppercase tracking-wider text-slate-500 font-semibold mt-1">Zusagen</div>
            </div>
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 text-center">
                <div id="stat-no" class="text-3xl font-extrabold text-rose-500">0</div>
                <div class="text-xs uppercase tracking-wider text-slate-500 font-semibold mt-1">Absagen</div>
            </div>
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 text-center">
                <div id="stat-total" class="text-3xl font-extrabold text-slate-700">0</div>
                <div class="text-xs uppercase tracking-wider text-slate-500 font-semibold mt-1">Gesamt</div>
            </div>
        </div>

        <!-- Tabelle -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <table class="w-full text-sm">
                <thead>
                    <tr class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider">
                        <th class="text-left font-semibold px-4 py-3">Name</th>
                        <th class="text-left font-semibold px-4 py-3">Antwort</th>
                        <th class="text-left font-semibold px-4 py-3 hidden sm:table-cell">Zeitpunkt</th>
                    </tr>
                </thead>
                <tbody id="rsvp-rows" class="divide-y divide-slate-100">
                    <tr><td colspan="3" class="px-4 py-6 text-center text-slate-400">Lade…</td></tr>
                </tbody>
            </table>
        </div>

        <p class="text-xs text-slate-400 mt-4">Tipp: Diese Seite ist passwortgeschützt. Lade sie neu, um die neuesten Antworten zu sehen.</p>
    </div>

    <script>
        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return String(text).replace(/[&<>"']/g, (m) => map[m]);
        }

        function formatDate(iso) {
            try {
                return new Date(iso).toLocaleString('de-DE', {
                    day: '2-digit', month: '2-digit', year: 'numeric',
                    hour: '2-digit', minute: '2-digit',
                });
            } catch { return ''; }
        }

        async function load() {
            const res = await fetch('/api/admin/rsvps');
            if (!res.ok) {
                document.getElementById('rsvp-rows').innerHTML =
                    '<tr><td colspan="3" class="px-4 py-6 text-center text-rose-500">Zugriff verweigert.</td></tr>';
                return;
            }
            const rows = await res.json();

            const yes = rows.filter((r) => r.attending).length;
            document.getElementById('stat-yes').innerText = yes;
            document.getElementById('stat-no').innerText = rows.length - yes;
            document.getElementById('stat-total').innerText = rows.length;

            const tbody = document.getElementById('rsvp-rows');
            if (!rows.length) {
                tbody.innerHTML = '<tr><td colspan="3" class="px-4 py-6 text-center text-slate-400">Noch keine Antworten.</td></tr>';
                return;
            }
            tbody.innerHTML = rows.map((r) => `
                <tr>
                    <td class="px-4 py-3 font-semibold text-slate-800">${escapeHtml(r.name)}</td>
                    <td class="px-4 py-3">
                        ${r.attending
                            ? '<span class="inline-flex items-center gap-1 text-emerald-700 bg-emerald-50 px-2 py-1 rounded-full text-xs font-bold">✅ Dabei</span>'
                            : '<span class="inline-flex items-center gap-1 text-rose-700 bg-rose-50 px-2 py-1 rounded-full text-xs font-bold">❌ Abgesagt</span>'}
                    </td>
                    <td class="px-4 py-3 text-slate-500 hidden sm:table-cell">${formatDate(r.created_at)}</td>
                </tr>
            `).join('');
        }

        load();
    </script>
</body>
</html>
