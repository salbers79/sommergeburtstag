services:
  - type: web
    name: sommergeburtstag
    runtime: node
    # Starter (oder höher) = kein Einschlafen, Seite immer sofort erreichbar
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "22"
      # Passwort für den /admin-Bereich (Benutzername beliebig, z. B. "admin")
      - key: ADMIN_PASSWORD
        sync: false
      # Verbindung zur Render-PostgreSQL-Datenbank
      - key: DATABASE_URL
        fromDatabase:
          name: sommergeburtstag-db
          property: connectionString

databases:
  - name: sommergeburtstag-db
    plan: free
